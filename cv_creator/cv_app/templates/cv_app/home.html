<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <title>CV Uygulaması</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">CV Uygulamasına Hoş Geldiniz!</h1>
    <p class="text-center">Aşağıdan bir CV şablonu seçerek düzenlemeye başlayabilirsiniz.</p>

    <div class="row justify-content-center mt-4">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Şablon 1" />
                <div class="card-body text-center">
                    <h5 class="card-title">Şablon 1</h5>
                    <a href="{% url 'form' template_id=1 %}" class="btn btn-primary">Seç</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Şablon 2" />
                <div class="card-body text-center">
                    <h5 class="card-title">Şablon 2</h5>
                    <a href="{% url 'form' template_id=2 %}" class="btn btn-primary">Seç</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
